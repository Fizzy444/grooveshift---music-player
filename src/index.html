<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GrooveShift</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080c14;
    --bg2:       #0c1120;
    --bg3:       #111827;
    --border:    #1e2a3f;
    --accent:    #4f8ef7;
    --accent-dim:#2a4f99;
    --accent-glow:#4f8ef733;
    --text:      #c8d8f0;
    --text-dim:  #5a7aaa;
    --text-muted:#1e2e4a;
    --red:       #e05555;
    --green:     #27ae60;
    --radius:    10px;
    --font-serif: 'DM Serif Display', Georgia, serif;
    --font-mono:  'DM Mono', 'Courier New', monospace;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px; line-height: 1.5;
    user-select: none; -webkit-user-select: none;
  }

  #app {
    display: grid;
    grid-template-rows: 40px 1fr 160px;
    height: 100vh;
  }

  /* TITLEBAR */
  #titlebar {
    display: flex; align-items: center;
    padding: 0 16px; gap: 12px;
    -webkit-app-region: drag;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  #titlebar .logo {
    font-family: var(--font-serif);
    font-size: 16px; color: var(--accent);
    letter-spacing: 0.04em;
  }
  #titlebar .spacer { flex: 1; }
  #titlebar .win-btn {
    -webkit-app-region: no-drag;
    width: 28px; height: 28px;
    border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1; font-size: 11px; transition: background 0.15s;
    background: var(--bg3); color: var(--text-dim);
  }
  #titlebar .win-btn:hover { background: var(--border); color: var(--text); }
  #titlebar .win-btn.close:hover { background: var(--red); color: #fff; }

  /* BODY */
  #body {
    display: grid;
    grid-template-columns: 260px 1fr;
    overflow: hidden;
  }

  /* SIDEBAR */
  #sidebar {
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    background: var(--bg2);
    overflow: hidden;
  }
  #sidebar-header {
    padding: 16px; display: flex; align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header span {
    font-size: 10px; letter-spacing: 0.15em;
    color: var(--text-dim); text-transform: uppercase;
  }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); padding: 4px 6px;
    border-radius: 5px; transition: all 0.15s;
    font-size: 13px;
  }
  .icon-btn:hover { background: var(--bg3); color: var(--accent); }
  #add-btns { display: flex; gap: 4px; }

  #playlist {
    flex: 1; overflow-y: auto; padding: 8px 0;
  }
  #playlist::-webkit-scrollbar { width: 4px; }
  #playlist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .track-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; cursor: pointer;
    transition: background 0.1s; position: relative;
  }
  .track-item:hover { background: var(--bg3); }
  .track-item.active { background: var(--bg3); }
  .track-item.active::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .track-num {
    width: 20px; text-align: right;
    color: var(--text-muted); font-size: 11px; flex-shrink: 0;
  }
  .track-item.active .track-num { color: var(--accent); }
  .track-info { flex: 1; min-width: 0; }
  .track-name {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-size: 12px; color: var(--text);
  }
  .track-item.active .track-name { color: var(--accent); }
  .track-duration {
    font-size: 10px; color: var(--text-dim); flex-shrink: 0;
  }
  .track-plays {
    font-size: 9px; color: var(--text-muted);
  }

  .empty-state {
    padding: 40px 20px; text-align: center;
    color: var(--text-muted); line-height: 2;
  }
  .empty-state .big { font-size: 28px; }
  .empty-state p { font-size: 11px; }

  /* MAIN AREA */
  #main {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px; gap: 24px; overflow: hidden;
    position: relative;
  }

  #ambient-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 60% at 50% 30%, var(--accent-glow), transparent 70%);
    pointer-events: none; transition: opacity 1s;
    opacity: 0;
  }
  #ambient-bg.active { opacity: 1; }

  #artwork-wrap {
    position: relative; width: 200px; height: 200px;
    flex-shrink: 0;
  }
  #artwork-ring {
    position: absolute; inset: -12px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: border-color 0.5s;
  }
  #artwork-ring.playing {
    border-color: var(--accent-dim);
    animation: spin 12s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #artwork {
    width: 200px; height: 200px;
    border-radius: 50%;
    background: var(--bg3);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 64px;
    box-shadow: 0 0 40px #00000080;
    overflow: hidden;
    transition: box-shadow 0.5s;
  }
  #artwork.playing {
    box-shadow: 0 0 60px var(--accent-glow), 0 0 20px #00000090;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 40px var(--accent-glow), 0 0 20px #00000090; }
    50% { box-shadow: 0 0 80px var(--accent-glow), 0 0 30px #00000090; }
  }

  /* TRACK DISPLAY */
  #now-playing {
    text-align: center; max-width: 420px; z-index: 1;
  }
  #track-title {
    font-family: var(--font-serif);
    font-size: 26px; color: var(--text);
    line-height: 1.2; margin-bottom: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 420px;
  }
  #track-reason {
    font-size: 11px; color: var(--accent-dim);
    letter-spacing: 0.05em; min-height: 16px;
  }

  /* VISUALIZER */
  #visualizer-wrap {
    width: 100%; max-width: 460px; height: 48px;
    position: relative; z-index: 1;
  }
  #visualizer {
    width: 100%; height: 100%;
  }

  /* VIBE DIAL */
  #vibe-section {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    z-index: 1;
  }
  #vibe-label-row {
    display: flex; justify-content: space-between; width: 320px;
    font-size: 10px; letter-spacing: 0.1em; color: var(--text-muted);
    text-transform: uppercase;
  }
  #vibe-track {
    width: 320px; height: 4px;
    background: var(--border); border-radius: 2px; position: relative;
  }
  #vibe-fill {
    position: absolute; left: 0; top: 0; height: 100%;
    background: linear-gradient(90deg, #1a3a7a, #4f8ef7, #7b5cf7);
    border-radius: 2px; transition: width 0.1s;
  }
  #vibe-thumb {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--bg);
    cursor: grab; transition: box-shadow 0.15s;
    box-shadow: 0 0 0 0 var(--accent-glow);
  }
  #vibe-thumb:active { cursor: grabbing; }
  #vibe-thumb.dragging {
    box-shadow: 0 0 0 6px var(--accent-glow);
  }
  #vibe-name {
    font-size: 11px; color: var(--accent);
    letter-spacing: 0.1em; text-transform: uppercase;
    min-height: 16px;
  }
  #vibe-why {
    font-size: 10px; color: var(--text-dim); min-height: 14px;
  }

  /* BOTTOM PLAYER */
  #player {
    border-top: 1px solid var(--border);
    background: var(--bg2);
    display: flex; flex-direction: column;
    padding: 14px 24px 18px;
    gap: 12px;
  }

  /* PROGRESS */
  #progress-row {
    display: flex; align-items: center; gap: 12px;
  }
  #time-cur, #time-total {
    font-size: 11px; color: var(--text-dim); width: 36px; flex-shrink: 0;
  }
  #time-total { text-align: right; }
  #progress-wrap {
    flex: 1; height: 4px; background: var(--border);
    border-radius: 2px; cursor: pointer; position: relative;
  }
  #progress-bar {
    height: 100%; background: var(--accent);
    border-radius: 2px; pointer-events: none;
    transition: width 0.1s linear;
  }
  #progress-wrap::after {
    content: '';
    position: absolute; top: 50%; right: 0;
    transform: translateY(-50%);
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); opacity: 0;
    transition: opacity 0.15s;
  }
  #progress-wrap:hover::after { opacity: 1; }

  /* CONTROLS */
  #controls-row {
    display: flex; align-items: center;
    position: relative; height: 56px;
  }
  #controls-center {
    position: absolute; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
  }
  .ctrl-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); transition: color 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    padding: 0; border-radius: 50%;
  }
  .ctrl-btn svg { display: block; flex-shrink: 0; }
  .ctrl-btn:hover { color: var(--text); }
  .ctrl-btn:active { transform: scale(0.9); }
  .ctrl-btn.active { color: var(--accent); }
  #play-btn {
    width: 48px; height: 48px;
    background: var(--accent); border-radius: 50%;
    color: var(--bg);
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 0 0 0 var(--accent-glow);
  }
  #play-btn:hover {
    background: #6fa8ff;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  #play-btn:active { transform: scale(0.93); }

  #controls-right {
    display: flex; align-items: center; gap: 8px;
    margin-left: auto;
  }
  #volume-wrap {
    display: flex; align-items: center; gap: 8px;
  }
  #vol-slider {
    width: 80px; height: 3px;
    -webkit-appearance: none; background: var(--border);
    border-radius: 2px; cursor: pointer; outline: none;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--text-dim); cursor: pointer;
    transition: background 0.15s;
  }
  #vol-slider:hover::-webkit-slider-thumb { background: var(--accent); }

  /* SVG icons inline */
  svg { display: block; }

  .sort-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 4px;
    padding: 3px 8px; font-size: 10px; cursor: pointer;
    font-family: var(--font-mono); letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .sort-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sort-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

  #sidebar-footer {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    display: flex; gap: 4px; flex-wrap: wrap;
  }
</style>
</head>
<body>
<div id="app">

  <!-- TITLEBAR -->
  <div id="titlebar">
    <span class="logo">GrooveShift</span>
    <div class="spacer"></div>
    <button class="win-btn" id="btn-min">─</button>
    <button class="win-btn" id="btn-max">▢</button>
    <button class="win-btn close" id="btn-close">✕</button>
  </div>

  <!-- BODY -->
  <div id="body">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="sidebar-header">
        <span>Library</span>
        <div id="add-btns">
          <button class="icon-btn" id="add-files-btn" title="Add files">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
          <button class="icon-btn" id="add-folder-btn" title="Add folder">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="playlist">
        <div class="empty-state">
          <div class="big">♫</div>
          <p>Add files or a folder<br>to get started</p>
        </div>
      </div>
      <div id="sidebar-footer">
        <button class="sort-btn active" data-sort="default">Order</button>
        <button class="sort-btn" data-sort="vibe">By Vibe</button>
        <button class="sort-btn" data-sort="name">A–Z</button>
      </div>
    </div>

    <!-- MAIN -->
    <div id="main">
      <div id="ambient-bg"></div>
      <div id="artwork-wrap">
        <div id="artwork-ring"></div>
        <div id="artwork">♪</div>
      </div>
      <div id="now-playing">
        <div id="track-title">No track selected</div>
        <div id="track-reason"></div>
      </div>
      <div id="visualizer-wrap">
        <canvas id="visualizer"></canvas>
      </div>
      <div id="vibe-section">
        <div id="vibe-label-row">
          <span>Calm</span>
          <span>Vibe Dial</span>
          <span>Hype</span>
        </div>
        <div id="vibe-track">
          <div id="vibe-fill"></div>
          <div id="vibe-thumb"></div>
        </div>
        <div id="vibe-name">Balanced</div>
        <div id="vibe-why">Drag to shift the energy of what plays next</div>
      </div>
    </div>

  </div>

  <!-- PLAYER -->
  <div id="player">
    <div id="progress-row">
      <span id="time-cur">0:00</span>
      <div id="progress-wrap">
        <div id="progress-bar" style="width:0%"></div>
      </div>
      <span id="time-total">0:00</span>
    </div>
    <div id="controls-row">
      <div style="flex:1; display:flex; align-items:center; gap:6px; justify-content:flex-start;">
        <button class="ctrl-btn" id="shuffle-btn" title="Shuffle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="repeat-btn" title="Repeat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </button>
      </div>
      <div id="controls-center">
        <button class="ctrl-btn" id="prev-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="play-btn">
          <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="next-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/>
          </svg>
        </button>
      </div>
      <div id="controls-right">
        <div id="volume-wrap">
          <button class="ctrl-btn" id="mute-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path id="vol-wave" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
          </button>
          <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.8"/>
        </div>
      </div>
    </div>
  </div>

</div>

<audio id="audio"></audio>
<script src="renderer.js"></script>
</body>
</html>
